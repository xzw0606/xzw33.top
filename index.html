/* ===== 模拟交易面板 ===== */

.sim-loading { text-align:center; padding:3rem 1rem; color:var(--text-secondary); font-size:1.1rem; }

.sim-dashboard { animation:fadeIn 0.4s ease; }

.sim-card.card-pos::before { background:linear-gradient(90deg,#f59e0b,var(--neon-pink)); }
